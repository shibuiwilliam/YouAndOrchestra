repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy src/yao/
        language: system
        types: [python]
        pass_filenames: false

      - id: arch-lint
        name: architecture lint
        entry: python tools/architecture_lint.py
        language: system
        types: [python]
        pass_filenames: false

      - id: test-unit
        name: unit tests (fast)
        entry: pytest tests/unit/ -q --tb=line -x
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
