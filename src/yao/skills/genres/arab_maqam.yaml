genre: arab_maqam
cultural_context: Arabic maqam system of the Eastern Mediterranean and Middle East
  (Egypt, Lebanon, Syria, Palestine, Iraq). Modal system with quarter-tone intervals
  not found in Western 12-EDO. Default tuning follows Egyptian/Levantine practice.
  Turkish makam system is related but distinct and should be treated separately.
tempo_range:
- 60
- 140
typical_keys:
- C
- D
- G
- Bb
modal_options:
- maqam_rast
- maqam_bayati
default_swing: 0.0
typical_drum_pattern: null
preferred_instruments:
- oud
- qanun
- nay
- violin
- riq
- darbuka
avoided_instruments:
- electric_guitar_distortion
- drums
- synth_lead_saw
forbidden_in_pure_form:
- equal_temperament_strict
- chord_progressions
- drum_kit_patterns
- major_minor_system
allowed_relaxations:
- fusion: Western harmony may accompany maqam melody in pop/fusion
- arabic_pop: Simplified maqam over synthesizer beds
- film: Maqam motifs over orchestral arrangement
expert_review_note: Based on Marcus, S.L. 'Music in Egypt' (2007, Oxford Univ. Press);
  Touma, H.H. 'The Music of the Arabs' (1996, Amadeus Press). Egyptian/Levantine tuning
  as default. Not reviewed by a practicing Arab musician.
references:
- Marcus, S.L. (2007). Music in Egypt. Oxford University Press.
- Touma, H.H. (1996). The Music of the Arabs. Amadeus Press.
- Racy, A.J. (2003). Making Music in the Arab World. Cambridge University Press.
