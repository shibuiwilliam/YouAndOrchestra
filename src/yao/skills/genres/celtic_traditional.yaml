genre: celtic_traditional
cultural_context: "Irish and Scottish traditional music, commonly grouped under the\
  \ modern umbrella 'Celtic.' This is an oral tradition with deep cultural significance.\
  \ The term 'Celtic' is a modern marketing convenience \u2014 practitioners typically\
  \ identify as Irish traditional, Scottish traditional, etc."
tempo_range:
- 80
- 160
typical_keys:
- D
- G
- Am
- Em
- A
modal_options:
- dorian
- mixolydian
- major
default_swing: 0.0
typical_drum_pattern: null
preferred_instruments:
- fiddle
- tin_whistle
- flute
- uilleann_pipes
- bodhran
- acoustic_guitar
- harp
avoided_instruments:
- drums
- electric_guitar_distortion
- synth_lead_saw
- piano
typical_chord_progressions:
- - I
  - V
  - vi
  - IV
- - i
  - VII
  - VI
  - V
- - I
  - IV
  - I
  - V
characteristic_rhythms:
- jig_6_8
- reel_4_4
- slip_jig_9_8
- hornpipe
forbidden_in_pure_form:
- drum_kit
- synth_instruments
- chromatic_harmony
allowed_relaxations:
- celtic_fusion: Electric instruments acceptable in folk-rock context
- film: Orchestral arrangements with traditional melodic material
- contemporary: Piano accompaniment acceptable in some contexts
expert_review_note: Based on Vallely, F. 'The Companion to Irish Traditional Music'
  (2011, Cork Univ. Press); Breathnach, B. 'Folk Music and Dances of Ireland' (1971).
  Not reviewed by a traditional musician.
references:
- Vallely, F. (2011). The Companion to Irish Traditional Music. Cork University Press.
- Breathnach, B. (1971). Folk Music and Dances of Ireland. Ossian Publications.
- Hast, D. & Scott, S. (2004). Music in Ireland. Oxford University Press.
