genre: bossa_nova
cultural_context: Brazilian musical genre originating in late 1950s Rio de Janeiro.
  Fusion of samba rhythm with jazz harmony. Represents a significant cultural expression
  of Brazil and should be treated with respect for its origins, not reduced to 'Brazilian
  jazz.'
tempo_range:
- 110
- 140
typical_keys:
- C
- F
- G
- Dm
- Am
modal_options:
- major
- minor
- dorian
default_swing: 0.1
typical_drum_pattern: bossa_nova
preferred_instruments:
- acoustic_guitar
- piano
- acoustic_bass
- flute
- drums
avoided_instruments:
- electric_guitar_distortion
- synth_lead_saw
- timpani
typical_chord_progressions:
- - Imaj7
  - ii7
  - V7
  - Imaj7
- - Imaj7
  - IVmaj7
  - iii7
  - vi7
- - ii7
  - V7
  - Imaj7
  - vi7
- - Imaj7
  - bIImaj7
  - ii7
  - V7
characteristic_rhythms:
- bossa_clave
- syncopated_bass
forbidden_in_pure_form:
- straight_eighth_notes
- heavy_backbeat
- power_chords
allowed_relaxations:
- fusion: Combined with jazz improvisation traditions
- pop: Simplified rhythmic pattern over pop structure
expert_review_note: Based on McGowan & Pessanha 'The Brazilian Sound' (2009, Temple
  Univ. Press); Perrone, C. 'Brazilian Popular Music and Globalization' (2001). Cultural
  context verified against academic sources but not reviewed by a Brazilian musician.
references:
- McGowan, C. & Pessanha, R. (2009). The Brazilian Sound. Temple University Press.
- 'Castro, R. (2000). Bossa Nova: The Story of the Brazilian Music That Seduced the
  World. A Capella Books.'
