metadata:
  name: "pentatonic_bigram"
  description: "Bigram pitch transition probabilities for 5-note pentatonic scales. Suited for folk, pop, and East Asian styles."
  source: "Hand-crafted from pentatonic melodic conventions (no copyrighted corpus)"
  license: "CC0 — original work by YaO project"
  n_gram_order: 2

# Scale degree transitions for pentatonic (5 degrees: 0-4).
# Stepwise motion within the gapped scale is preferred.
transitions:
  0: {0: 0.05, 1: 0.30, 2: 0.20, 3: 0.15, 4: 0.30}
  1: {0: 0.30, 1: 0.05, 2: 0.30, 3: 0.20, 4: 0.15}
  2: {0: 0.15, 1: 0.25, 2: 0.05, 3: 0.30, 4: 0.25}
  3: {0: 0.20, 1: 0.15, 2: 0.25, 3: 0.05, 4: 0.35}
  4: {0: 0.35, 1: 0.15, 2: 0.15, 3: 0.30, 4: 0.05}
