metadata:
  name: "diatonic_bigram"
  description: "Bigram pitch transition probabilities for 7-note diatonic scales. Stepwise motion preferred, with leading-tone resolution and dominant-tonic pull."
  source: "Hand-crafted from common-practice voice-leading principles (no copyrighted corpus)"
  license: "CC0 — original work by YaO project"
  n_gram_order: 2

# Scale degree transitions: current_degree → {next_degree: probability}
# Degrees 0-6 map to scale steps (0=tonic, 1=supertonic, ..., 6=leading tone).
# Probabilities sum to 1.0 per row. Stepwise motion (±1 degree) is favoured.
transitions:
  0: {0: 0.05, 1: 0.25, 2: 0.12, 3: 0.08, 4: 0.25, 5: 0.10, 6: 0.15}
  1: {0: 0.25, 1: 0.05, 2: 0.30, 3: 0.10, 4: 0.10, 5: 0.10, 6: 0.10}
  2: {0: 0.10, 1: 0.25, 2: 0.05, 3: 0.30, 4: 0.10, 5: 0.10, 6: 0.10}
  3: {0: 0.12, 1: 0.10, 2: 0.25, 3: 0.05, 4: 0.28, 5: 0.10, 6: 0.10}
  4: {0: 0.28, 1: 0.10, 2: 0.10, 3: 0.12, 4: 0.05, 5: 0.25, 6: 0.10}
  5: {0: 0.10, 1: 0.10, 2: 0.08, 3: 0.12, 4: 0.25, 5: 0.05, 6: 0.30}
  6: {0: 0.40, 1: 0.10, 2: 0.08, 3: 0.08, 4: 0.12, 5: 0.12, 6: 0.10}
