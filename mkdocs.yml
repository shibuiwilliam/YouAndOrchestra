site_name: YaO Documentation
site_description: An agentic music production environment built on Claude Code
repo_url: https://github.com/yao-project/yao

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: amber
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started/quickstart.md
    - Spec Templates: getting-started/templates.md
    - Audio Setup: getting-started/audio-setup.md
  - User Guide:
    - CLI Reference: guide/cli-reference.md
    - Composition Specs: guide/composition-spec.md
    - Trajectory System: guide/trajectories.md
    - Constraint System: guide/constraints.md
  - Architecture:
    - Layer Model: architecture/layers.md
  - Design:
    - Arrange:
      - Overview: design/arrange/overview.md
    - Feedback:
      - NL Translation: design/feedback/nl-translation.md
      - Pin: design/feedback/pin.md
    - Perception:
      - Audio Features: design/perception/stage1.md
      - Surprise: design/perception/surprise.md
    - Plan IR:
      - Conversation: design/plan-ir/conversation.md
      - Groove: design/plan-ir/groove.md
      - Hook: design/plan-ir/hook.md
      - Tension Arcs: design/plan-ir/tension-arcs.md
    - Sketch:
      - Multilingual: design/sketch/multilingual.md
    - Spec:
      - Forms: design/spec/forms.md
  - Tutorials:
    - Claude Code Workflow: tutorials/claude-code-workflow.md
  - Guides:
    - Feature Status Discipline: guides/feature-status-discipline.md
  - Reference:
    - Glossary: glossary.md
    - Provenance Schema: provenance-schema.md
    - Supported Instruments: reference/instruments.md
    - Music Theory: reference/music-theory.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
