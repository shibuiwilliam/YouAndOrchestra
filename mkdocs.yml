site_name: YaO Documentation
site_description: An agentic music production environment built on Claude Code
repo_url: https://github.com/yao-project/yao

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: amber
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started/quickstart.md
    - Spec Templates: getting-started/templates.md
    - Audio Setup: getting-started/audio-setup.md
  - User Guide:
    - CLI Reference: guide/cli-reference.md
    - Composition Specs: guide/composition-spec.md
    - Trajectory System: guide/trajectories.md
    - Constraint System: guide/constraints.md
  - Architecture:
    - Layer Model: architecture/layers.md
    - Design Decisions: architecture/decisions.md
    - "ADR-0001: Layer Architecture": design/0001-layer-architecture.md
  - Tutorials:
    - Claude Code Workflow: tutorials/claude-code-workflow.md
  - Guides:
    - Matrix Discipline: guides/matrix-discipline.md
    - Feature Status Discipline: guides/feature-status-discipline.md
  - Reference:
    - Glossary: glossary.md
    - Provenance Schema: provenance-schema.md
    - Supported Instruments: reference/instruments.md
    - Music Theory: reference/music-theory.md
  - Migration:
    - v1.1 Baseline Report: migration/v1.1-baseline-report.md
    - v2 Baseline Report: migration/v2-baseline-report.md
    - v2 Progress: migration/v2-progress.md
    - v2 Gap Closure Plan: migration/v2-gap-closure-plan.md
    - v2 Improvement Plan: migration/v2-improvement-plan.md
    - v2 Functional Improvement: migration/v2-functional-improvement-plan.md
    - v2 Document Transition: migration/v2-document-transition.md
    - Silent Fallback Inventory: migration/silent-fallback-inventory.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
